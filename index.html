<!DOCTYPE html>
<html>
<head>
    <title>Grid Collage Maker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; text-align: center; overflow: hidden; }
        .toolbar { padding: 15px; display: flex; gap: 10px; justify-content: center; background: #1c1c1e; }
        .btn { background: #007AFF; color: #fff; padding: 12px 20px; border-radius: 10px; border: none; font-weight: bold; }
        canvas { display: block; margin: 20px auto; background: #111; touch-action: none; border: 2px dashed #333; }
        .hint { color: #8e8e93; font-size: 13px; }
    </style>
</head>
<body>

<div class="toolbar">
    <label class="btn">Add Photos <input type="file" id="fileIn" accept="image/*" multiple style="display:none"></label>
    <button class="btn" style="background:#34C759" onclick="download()">Save Collage</button>
</div>
<p class="hint">Drag images to swap their positions</p>
<canvas id="cvs"></canvas>

<script>
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    let images = [];
    let draggingIdx = -1;

    cvs.width = window.innerWidth - 40;
    cvs.height = window.innerHeight - 150;

    document.getElementById('fileIn').onchange = (e) => {
        for (let file of e.target.files) {
            let reader = new FileReader();
            reader.onload = (ev) => {
                let img = new Image();
                img.src = ev.target.result;
                img.onload = () => {
                    images.push(img);
                    draw();
                };
            };
            reader.readAsDataURL(file);
        }
    };

    function getGridInfo() {
        const count = images.length;
        const cols = count <= 1 ? 1 : count <= 4 ? 2 : 3;
        const rows = Math.ceil(count / cols);
        const cellW = cvs.width / cols;
        const cellH = cvs.height / rows;
        return { cols, rows, cellW, cellH };
    }

    function draw() {
        ctx.clearRect(0, 0, cvs.width, cvs.height);
        const { cols, cellW, cellH } = getGridInfo();

        images.forEach((img, i) => {
            const col = i % cols;
            const row = Math.floor(i / cols);
            const x = col * cellW;
            const y = row * cellH;

            // Fit image into cell without stretching
            let sRatio = Math.min(cellW / img.width, cellH / img.height);
            let w = img.width * sRatio;
            let h = img.height * sRatio;
            
            ctx.drawImage(img, x + (cellW - w)/2, y + (cellH - h)/2, w, h);
            
            // Draw border
            ctx.strokeStyle = "#333";
            ctx.strokeRect(x, y, cellW, cellH);
        });
    }

    // Interactive Drag and Swap Logic
    cvs.onpointerdown = (e) => {
        const { cols, cellW, cellH } = getGridInfo();
        const rect = cvs.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        const col = Math.floor(x / cellW);
        const row = Math.floor(y / cellH);
        const idx = row * cols + col;

        if (idx < images.length) draggingIdx = idx;
    };

    cvs.onpointerup = (e) => {
        if (draggingIdx === -1) return;
        
        const { cols, cellW, cellH } = getGridInfo();
        const rect = cvs.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        const col = Math.floor(x / cellW);
        const row = Math.floor(y / cellH);
        const targetIdx = row * cols + col;

        if (targetIdx < images.length && targetIdx !== draggingIdx) {
            // Swap the images in the array
            [images[draggingIdx], images[targetIdx]] = [images[targetIdx], images[draggingIdx]];
            draw();
        }
        draggingIdx = -1;
    };

    function download() {
        const link = document.createElement('a');
        link.download = 'collage.png';
        link.href = cvs.toDataURL();
        link.click();
    }
</script>
</body>
</html>
