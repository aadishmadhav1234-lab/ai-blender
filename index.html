<!DOCTYPE html>
<html>
<head>
    <title>Collage Studio Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --accent: #007AFF; --bg: #000; --card: #1c1c1e; --danger: #FF453A; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: #fff; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .tab { display: none; height: 100%; width: 100%; flex-direction: column; position: relative; }
        .tab.active { display: flex; }

        /* Welcome Screen */
        #screen-welcome { background: #000; justify-content: center; align-items: center; text-align: center; }
        .large-add-btn {
            background: rgba(255, 255, 255, 0.03); border: 2px solid var(--accent);
            width: 210px; height: 210px; border-radius: 50%; color: white;
            display: flex; align-items: center; justify-content: center; font-weight: 800; cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 122, 255, 0.2);
        }

        /* Editor UI */
        .hint-bar { background: var(--accent); color: white; font-size: 11px; text-align: center; padding: 7px; font-weight: 800; letter-spacing: 0.3px; text-transform: uppercase; }
        .editor-top { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 18px; background: #111; border-bottom: 1px solid #333; }
        
        #canvas-container { flex-grow: 1; position: relative; background: #080808; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        canvas { touch-action: none; background: #0a0a0a; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        
        .dock { background: #111; border-top: 1px solid #333; padding: 15px 12px 40px; }
        .tool { background: #2c2c2e; border: none; color: #fff; padding: 16px; border-radius: 14px; font-size: 13px; font-weight: 700; flex: 1; -webkit-tap-highlight-color: transparent; }

        /* Professional Layer Menu */
        #ctx-menu {
            display: none; position: fixed; background: rgba(32, 32, 34, 0.98); backdrop-filter: blur(25px);
            border-radius: 16px; width: 230px; z-index: 9999; border: 1px solid #444; box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }
        .menu-item { padding: 18px; font-size: 15px; border-bottom: 1px solid #38383a; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .menu-item:active { background: rgba(255,255,255,0.1); }
        .menu-item:last-child { border: none; color: var(--danger); }

        /* Export Overlay */
        #export-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; flex-direction: column; align-items: center; padding-top: 45px; }
        #preview-img { width: 88%; border-radius: 12px; max-height: 58%; object-fit: contain; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="screen-welcome" class="tab active">
        <label class="large-add-btn">SELECT PHOTOS<input type="file" id="fileIn" accept="image/*" multiple></label>
        <button id="nextBtn" style="display:none; background:var(--accent); border:none; color:white; padding:16px 55px; border-radius:35px; margin-top:35px; font-weight:900; font-size:16px;" onclick="showLayout()">CONTINUE ➔</button>
    </div>

    <div id="screen-layout" class="tab" style="justify-content:center; align-items:center;">
        <div style="background:var(--card); padding:35px; border-radius:28px; width:80%; text-align:center; border:1px solid #333;">
            <h3 style="margin-bottom:25px; font-size:22px;">Canvas Setup</h3>
            <button class="tool" style="width:100%; margin-bottom:12px; background:var(--accent);" onclick="initEditor('P')">Portrait Stack</button>
            <button class="tool" style="width:100%; background:#5856D6;" onclick="initEditor('L')">Landscape Grid</button>
        </div>
    </div>

    <div id="screen-editor" class="tab">
        <div class="hint-bar">Long-Press Image to Move Front/Back</div>
        <div class="editor-top">
            <button style="background:none; border:none; color:#8e8e93; font-weight:bold; font-size:14px;" onclick="location.reload()">CLOSE</button>
            <button style="background:none; border:none; color:#34C759; font-weight:900; font-size:18px;" onclick="prepExport()">EXPORT</button>
        </div>
        <div id="canvas-container"><canvas id="cvs"></canvas></div>
        <div class="dock">
            <div style="display:flex; gap:12px;">
                <button class="tool" onclick="reformat('P')">Reset Portrait</button>
                <button class="tool" onclick="reformat('L')">Reset Landscape</button>
            </div>
        </div>
    </div>

    <div id="ctx-menu">
        <div class="menu-item" onclick="layerToFront()">Bring to Front <span>⇪</span></div>
        <div class="menu-item" onclick="layerToBack()">Send to Back <span>⇊</span></div>
        <div class="menu-item" onclick="deleteItem()">Remove Image</div>
    </div>

    <div id="export-overlay">
        <div style="position:absolute; top:20px; right:25px; font-size:35px; font-weight:bold;" onclick="document.getElementById('export-overlay').style.display='none'">✕</div>
        <img id="preview-img" src="">
        <div style="display:flex; width:90%; gap:15px; margin-top:35px;">
            <button class="tool" style="background:#2c2c2e; padding:20px;" onclick="downloadImg()">Download</button>
            <button class="tool" style="background:var(--accent); padding:20px;" onclick="shareImg()">Share 📤</button>
        </div>
    </div>

<script>
    let rawFiles = [], items = [], selectedIdx = -1, handleIdx = -1;
    const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d'), menu = document.getElementById('ctx-menu');

    document.getElementById('fileIn').onchange = (e) => {
        rawFiles = Array.from(e.target.files);
        if(rawFiles.length > 0) document.getElementById('nextBtn').style.display = 'block';
    };

    function showLayout() {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('screen-layout').classList.add('active');
    }

    function initEditor(mode) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('screen-editor').classList.add('active');
        // Account for toolbars and safety areas
        cvs.width = window.innerWidth; 
        cvs.height = window.innerHeight - 230; 
        
        let loaded = 0; items = [];
        rawFiles.forEach((file) => {
            let reader = new FileReader();
            reader.onload = (ev) => {
                let img = new Image(); img.src = ev.target.result;
                img.onload = () => {
                    items.push({ src:img, x:0, y:0, w:160, h:160 });
                    if(++loaded === rawFiles.length) reformat(mode);
                }
            };
            reader.readAsDataURL(file);
        });
    }

    function reformat(mode) {
        let cols = (mode === 'P') ? 1 : 2;
        let cellW = cvs.width/cols, cellH = cvs.height/Math.ceil(items.length/cols);
        items.forEach((itm, i) => {
            itm.w = cellW - 50; itm.h = cellH - 50;
            itm.x = (i % cols) * cellW + 25; itm.y = Math.floor(i / cols) * cellH + 25;
        });
        selectedIdx = -1; draw();
    }

    function draw(isExport = false) {
        ctx.clearRect(0,0,cvs.width,cvs.height);
        items.forEach((itm, i) => {
            ctx.drawImage(itm.src, itm.x, itm.y, itm.w, itm.h);
            if(!isExport && i === selectedIdx) {
                // Professional Focus Ring
                ctx.strokeStyle = '#007AFF'; ctx.lineWidth = 4;
                ctx.setLineDash([5, 5]); ctx.strokeRect(itm.x, itm.y, itm.w, itm.h);
                ctx.setLineDash([]);
                // Resize Handles
                getHandles(itm).forEach(p => {
                    ctx.fillStyle='white'; ctx.strokeStyle='#007AFF'; ctx.lineWidth=2;
                    ctx.beginPath(); ctx.arc(p.x,p.y,18,0,Math.PI*2); ctx.fill(); ctx.stroke();
                });
            }
        });
    }

    function getHandles(itm) { return [{x:itm.x,y:itm.y}, {x:itm.x+itm.w,y:itm.y}, {x:itm.x,y:itm.y+itm.h}, {x:itm.x+itm.w,y:itm.y+itm.h}]; }

    cvs.addEventListener('pointerdown', (e) => {
        menu.style.display = 'none';
        const r = cvs.getBoundingClientRect(), x = e.clientX-r.left, y = e.clientY-r.top;
        
        // Handle Resize Hitbox
        if(selectedIdx > -1) {
            handleIdx = getHandles(items[selectedIdx]).findIndex(p => Math.hypot(p.x-x, p.y-y) < 50);
            if(handleIdx > -1) return;
        }

        // Layer Selection & Auto-Front
        let found = items.findLastIndex(itm => x > itm.x && x < itm.x+itm.w && y > itm.y && y < itm.y+itm.h);
        if(found > -1) {
            selectedIdx = found;
            layerToFront(); 
        } else { selectedIdx = -1; }
        draw();
    });

    // Context Menu Logic
    cvs.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        const r = cvs.getBoundingClientRect(), x = e.clientX-r.left, y = e.clientY-r.top;
        let found = items.findLastIndex(itm => x > itm.x && x < itm.x+itm.w && y > itm.y && y < itm.y+itm.h);
        if(found > -1) {
            selectedIdx = found; draw();
            menu.style.top = Math.min(e.clientY, window.innerHeight - 200) + 'px';
            menu.style.left = Math.min(e.clientX, window.innerWidth - 240) + 'px';
            menu.style.display = 'block';
        }
    });

    cvs.addEventListener('pointermove', (e) => {
        if(selectedIdx === -1 || e.buttons !== 1) return;
        const r = cvs.getBoundingClientRect(), x = e.clientX-r.left, y = e.clientY-r.top;
        let itm = items[selectedIdx];
        if(handleIdx === 0) { itm.w += itm.x-x; itm.h += itm.y-y; itm.x=x; itm.y=y; }
        else if(handleIdx === 1) { itm.w = x-itm.x; itm.h += itm.y-y; itm.y=y; }
        else if(handleIdx === 2) { itm.w += itm.x-x; itm.x=x; itm.h = y-itm.y; }
        else if(handleIdx === 3) { itm.w = x-itm.x; itm.h = y-itm.y; }
        else { itm.x = x-itm.w/2; itm.y = y-itm.h/2; }
        draw();
    });

    function layerToFront() {
        if(selectedIdx === -1) return;
        let p = items.splice(selectedIdx, 1)[0];
        items.push(p);
        selectedIdx = items.length - 1;
        draw(); menu.style.display = 'none';
    }

    function layerToBack() {
        if(selectedIdx === -1) return;
        let p = items.splice(selectedIdx, 1)[0];
        items.unshift(p);
        selectedIdx = 0; // Lock focus to the same image at its new index
        draw(); menu.style.display = 'none';
    }

    function deleteItem() { if(selectedIdx > -1) { items.splice(selectedIdx,1); selectedIdx=-1; draw(); menu.style.display = 'none'; } }

    function prepExport() {
        selectedIdx = -1; draw(true);
        document.getElementById('preview-img').src = cvs.toDataURL("image/png", 1.0);
        document.getElementById('export-overlay').style.display = 'flex';
        draw();
    }

    function downloadImg() { 
        const a = document.createElement('a'); a.download = 'ProCollage.png'; 
        a.href = document.getElementById('preview-img').src; a.click(); 
    }
    
    async function shareImg() {
        const b = await (await fetch(document.getElementById('preview-img').src)).blob();
        if(navigator.share) await navigator.share({files: [new File([b], 'collage.png', {type:'image/png'})]});
    }
</script>
</body>
</html>
