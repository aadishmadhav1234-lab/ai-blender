<!DOCTYPE html>
<html>
<head>
    <title>Collage Studio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --accent: #007AFF; --bg: #000; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        input[type="file"] { display: none; }
        
        /* Navigation (Tabs) */
        .tab { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; left: 0; }
        .tab.active { display: flex; }

        /* --- SCREEN 1: WELCOME --- */
        #screen-welcome { 
            /* Kept the creative burst background you like */
            background: #000 url('image_8c0a32.jpg') no-repeat center center; 
            background-size: cover; justify-content: flex-end; padding-bottom: 50px; 
            align-items: center; /* Center buttons horizontally */
        }

        /* NEW LARGE ADD PHOTOS BUTTON */
        .large-add-btn {
            background: linear-gradient(180deg, #3795FF 0%, #157FFB 100%);
            border: 2px solid #55A8FF;
            width: 80%;
            height: 120px; /* Big button size */
            border-radius: 60px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,122,255,0.3);
            margin-bottom: 20px;
            transition: transform 0.1s;
        }
        .large-add-btn:active { transform: scale(0.98); }

        /* NEW STANDARD NEXT BUTTON */
        .standard-next-btn {
            background: linear-gradient(180deg, #CB2EFF 0%, #B200FB 100%);
            border: 2px solid #DE6FFF;
            width: 50%;
            height: 50px;
            border-radius: 25px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            display: none; /* Initially Hidden */
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .standard-next-btn:active { transform: scale(0.98); }

        /* --- SCREEN 2: LAYOUT --- */
        #screen-layout { justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .layout-card { background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(10px); padding: 30px; border-radius: 24px; text-align: center; border: 1px solid #333; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .btn-m { padding: 15px; border-radius: 12px; border: 1px solid #555; background: #333; color: white; font-weight: 600; cursor: pointer; }

        /* --- SCREEN 3: EDITOR --- */
        #screen-editor { padding: 0; background: #111; }
        .editor-top { height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #222; }
        canvas { touch-action: none; display: block; margin: auto; }
        .editor-dock { position: absolute; bottom: 0; width: 100%; height: 90px; background: rgba(20,20,22,0.9); border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div id="screen-welcome" class="tab active">
        <label class="large-add-btn">
            Big Add Photos +
            <input type="file" id="fileIn" accept="image/*" multiple>
        </label>
        
        <button id="nextBtn" class="standard-next-btn">Next</button>
    </div>

    <div id="screen-layout" class="tab">
        <div class="layout-card">
            <h2>Select Layout</h2>
            <div class="grid-2">
                <button class="btn-m" onclick="startEditor('P')">Portrait</button>
                <button class="btn-m" onclick="startEditor('L')">Landscape</button>
            </div>
        </div>
    </div>

    <div id="screen-editor" class="tab">
        </div>

<script>
    let rawFiles = [];

    // FILE SELECTION LOGIC
    document.getElementById('fileIn').onchange = (e) => {
        rawFiles = Array.from(e.target.files);
        if(rawFiles.length > 0) {
            // FIX: Reveal the Next button only after files are picked
            document.getElementById('nextBtn').style.display = 'flex';
        } else {
            document.getElementById('nextBtn').style.display = 'none';
        }
    };

    // NAVIGATION LOGIC
    document.getElementById('nextBtn').onclick = () => {
        setTab('screen-layout');
    };

    function setTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
    }

    function startEditor(mode) {
        setTab('screen-editor');
        // Editor canvas setup logic from previous versions goes here
    }
</script>
</body>
</html>
