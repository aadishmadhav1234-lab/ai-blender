<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Collage Studio Pro — Improved</title>
  <style>
    :root { --accent: #007AFF; --bg: #000; --card: #1c1c1e; }
    * {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      box-sizing: border-box;
      touch-action: manipulation;
    }
    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: var(--bg); color: #fff; margin: 0;
      height: 100vh; overflow: hidden; display: flex; flex-direction: column;
    }
    .tab { display: none; height: 100%; width: 100%; flex-direction: column; }
    .tab.active { display: flex; }

    #screen-welcome { justify-content: center; align-items: center; text-align: center; padding: 20px; }
    .main-btn {
      background: var(--accent); border: none; color: white; padding: 20px 50px;
      border-radius: 40px; font-weight: 800; font-size: 18px; cursor: pointer;
      box-shadow: 0 10px 30px rgba(0, 122, 255, 0.3);
      display: inline-flex; align-items:center; gap:10px;
    }

    .hint-bar { background: var(--accent); color: white; font-size: 11px; text-align: center; padding: 10px; font-weight: 900; }
    .top-nav { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: #111; }

    #canvas-wrap { flex-grow: 1; background: #080808; display: flex; align-items: center; justify-content: center; position: relative; }
    canvas { background: #000; box-shadow: 0 0 40px rgba(0,0,0,0.8); touch-action: none; }

    .bottom-dock { background: #111; border-top: 1px solid #333; padding: 15px 15px 40px; }
    .tool-row { display: flex; gap: 10px; }
    .tool {
      flex: 1; background: #2c2c2e; border: none; color: #fff; padding: 14px 8px;
      border-radius: 14px; font-size: 13px; font-weight: 700; text-align: center;
      cursor: pointer;
    }

    #menu {
      display: none; position: fixed; background: #222; border-radius: 15px;
      width: 200px; z-index: 9999; border: 1px solid #444; box-shadow: 0 6px 18px rgba(0,0,0,0.6);
    }
    .m-item { padding: 14px 16px; border-bottom: 1px solid #333; font-weight: 600; cursor: pointer; }
    .m-item:last-child { border: none; color: #FF453A; }

    input[type="file"] { display: none; }
    .muted { color:#888; font-size:13px; }
  </style>
</head>
<body>

  <div id="screen-welcome" class="tab active">
    <label class="main-btn" id="pickBtn">
      PICK IMAGES
      <input type="file" id="fileIn" accept="image/*" multiple>
    </label>
    <div id="nextBox" style="margin-top:40px; display:none;">
      <p id="count" class="muted" style="margin-bottom:15px;">0 Photos Selected</p>
      <button class="main-btn" style="background:#34C759" onclick="goLayout()">CONTINUE</button>
    </div>
  </div>

  <div id="screen-layout" class="tab" style="justify-content:center; align-items:center;">
    <div style="background:var(--card); padding:30px; border-radius:25px; width:85%; text-align:center;">
      <button class="tool" style="width:100%; background:var(--accent); margin-bottom:15px;" onclick="start('P')">Portrait Stack</button>
      <button class="tool" style="width:100%; background:#5856D6;" onclick="start('L')">Landscape Grid</button>
    </div>
  </div>

  <div id="screen-editor" class="tab">
    <div class="hint-bar">TAP TO SELECT | LONG-PRESS TO OPEN MENU | DRAG TO MOVE</div>
    <div class="top-nav">
      <button onclick="location.reload()" style="background:none; border:none; color:#888; cursor:pointer;">CANCEL</button>
      <button onclick="exportImg()" style="background:none; border:none; color:#34C759; font-weight:900; cursor:pointer;">SAVE</button>
    </div>
    <div id="canvas-wrap"><canvas id="c" aria-label="collage canvas"></canvas></div>
    <div class="bottom-dock">
      <div class="tool-row">
        <label class="tool" style="background:var(--accent); cursor:pointer;">
          ADD +
          <input type="file" id="addIn" accept="image/*" multiple>
        </label>
        <button class="tool" onclick="regrid('P')">Portrait</button>
        <button class="tool" onclick="regrid('L')">Landscape</button>
      </div>
    </div>
  </div>

  <div id="menu" role="menu" aria-hidden="true">
    <div class="m-item" onclick="toFront()">Bring to Front</div>
    <div class="m-item" onclick="toBack()">Send to Back</div>
    <div class="m-item" onclick="del()">Delete</div>
  </div>

<script>
  // Model
  let items = [];
  let selIdx = -1;

  // Canvas & UI refs
  const cvs = document.getElementById('c');
  const ctx = cvs.getContext('2d');
  const menu = document.getElementById('menu');
  const fileIn = document.getElementById('fileIn');
  const addIn = document.getElementById('addIn');
  const nextBox = document.getElementById('nextBox');
  const countText = document.getElementById('count');

  // Pointer / interaction state
  let activePointerId = null;
  let pointerDownPos = null;
  let isDragging = false;
  let longPressTimer = null;
  const LONG_PRESS_MS = 500;
  const DRAG_THRESHOLD = 6;

  // Helpers
  function updateNextBox() {
    const n = fileIn.files.length;
    if (n > 0) {
      nextBox.style.display = 'block';
      countText.innerText = n + (n === 1 ? " Photo Selected" : " Photos Selected");
    } else {
      nextBox.style.display = 'none';
    }
  }

  fileIn.addEventListener('change', updateNextBox);

  // addIn: append images to existing items
  addIn.addEventListener('change', async (e) => {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    const loaded = await Promise.all(files.map(loadFileImage));
    loaded.forEach(img => {
      items.push({ img, x: 60, y: 60, w: 180, h: 180 });
    });
    e.target.value = ''; // allow re-adding same file
    draw();
  });

  // Image loader returns Image
  function loadFileImage(file) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = (ev) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = ev.target.result;
      };
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  // Setup canvas size for DPR
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const cssW = window.innerWidth;
    const cssH = Math.max(100, window.innerHeight - 230);
    cvs.style.width = cssW + 'px';
    cvs.style.height = cssH + 'px';
    cvs.width = Math.round(cssW * dpr);
    cvs.height = Math.round(cssH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  window.addEventListener('resize', () => {
    resizeCanvas();
    draw();
  });

  // Start: read selected files and go to editor
  function goLayout() {
    document.getElementById('screen-welcome').classList.remove('active');
    document.getElementById('screen-layout').classList.add('active');
  }

  async function start(mode) {
    document.getElementById('screen-layout').classList.remove('active');
    document.getElementById('screen-editor').classList.add('active');
    resizeCanvas();

    const files = Array.from(fileIn.files || []);
    if (files.length === 0) {
      items = [];
      regrid(mode);
      return;
    }

    items = [];
    try {
      const imgs = await Promise.all(files.map(loadFileImage));
      imgs.forEach(img => items.push({ img, x: 0, y: 0, w: 120, h: 120 }));
      regrid(mode);
    } catch (err) {
      console.error('Failed loading images', err);
    }
  }

  // Layout items into a grid/stack
  function regrid(mode) {
    if (!cvs.width) resizeCanvas();
    const cols = (mode === 'P') ? 1 : 2;
    const cssW = parseFloat(cvs.style.width) || window.innerWidth;
    const cssH = parseFloat(cvs.style.height) || (window.innerHeight - 230);
    const cellW = cssW / cols;
    const rows = Math.max(1, Math.ceil(items.length / cols));
    const cellH = cssH / rows;

    items.forEach((itm, i) => {
      itm.w = Math.max(40, cellW - 40);
      itm.h = Math.max(40, cellH - 40);
      itm.x = (i % cols) * cellW + 20;
      itm.y = Math.floor(i / cols) * cellH + 20;
    });
    draw();
  }

  // Cross-browser hit test (findLastIndex fallback)
  function hitTest(x, y) {
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      if (x >= it.x && x <= it.x + it.w && y >= it.y && y <= it.y + it.h) return i;
    }
    return -1;
  }

  // Draw all items
  function draw() {
    // Clear
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    // Draw images in order
    items.forEach((itm, i) => {
      ctx.drawImage(itm.img, itm.x, itm.y, itm.w, itm.h);
      if (i === selIdx) {
        ctx.strokeStyle = '#007AFF';
        ctx.lineWidth = 5;
        ctx.strokeRect(itm.x, itm.y, itm.w, itm.h);
      }
    });
  }

  // Pointer handling with pointer capture + long-press
  cvs.addEventListener('pointerdown', (e) => {
    menu.style.display = 'none';
    const rect = cvs.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;

    const idx = hitTest(x, y);
    selIdx = idx;
    draw();

    activePointerId = e.pointerId;
    cvs.setPointerCapture(activePointerId);
    pointerDownPos = { x: e.clientX, y: e.clientY };
    isDragging = false;

    // Start long-press timer to open menu (if pointer stays and we have a selection)
    if (selIdx > -1) {
      longPressTimer = setTimeout(() => {
        // only show menu if user didn't start dragging
        if (!isDragging) {
          showMenuAt(e.clientX, e.clientY);
        }
      }, LONG_PRESS_MS);
    }
  });

  cvs.addEventListener('pointermove', (e) => {
    // ignore unrelated pointers
    if (activePointerId !== e.pointerId) return;

    // if no selection, nothing to drag
    if (selIdx === -1) return;

    const dx = e.clientX - pointerDownPos.x;
    const dy = e.clientY - pointerDownPos.y;
    if (!isDragging && Math.hypot(dx, dy) > DRAG_THRESHOLD) {
      isDragging = true;
      // cancel long press if we start dragging
      if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    }

    if (isDragging) {
      const rect = cvs.getBoundingClientRect();
      const it = items[selIdx];
      it.x = (e.clientX - rect.left) - it.w / 2;
      it.y = (e.clientY - rect.top) - it.h / 2;
      draw();
    }
  });

  cvs.addEventListener('pointerup', (e) => {
    if (activePointerId !== e.pointerId) return;
    // release capture
    try { cvs.releasePointerCapture(activePointerId); } catch {}
    activePointerId = null;
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    isDragging = false;
    pointerDownPos = null;
  });

  cvs.addEventListener('pointercancel', (e) => {
    if (activePointerId !== e.pointerId) return;
    try { cvs.releasePointerCapture(activePointerId); } catch {}
    activePointerId = null;
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    isDragging = false;
    pointerDownPos = null;
  });

  // Desktop right-click should also open menu (if an item selected)
  window.addEventListener('contextmenu', (e) => {
    if (e.target === cvs && selIdx > -1) {
      e.preventDefault();
      showMenuAt(e.clientX, e.clientY);
    }
  });

  function showMenuAt(clientX, clientY) {
    const pad = 8;
    // clamp menu position to viewport
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const menuW = 200;
    const menuH = 3 * 48; // approx
    let left = clientX;
    let top = clientY;
    if (left + menuW + pad > vw) left = Math.max(pad, vw - menuW - pad);
    if (top + menuH + pad > vh) top = Math.max(pad, vh - menuH - pad);
    menu.style.left = left + 'px';
    menu.style.top = top + 'px';
    menu.style.display = 'block';
    menu.setAttribute('aria-hidden', 'false');
  }

  // Actions
  function toFront() {
    if (selIdx < 0 || selIdx >= items.length) return;
    const p = items.splice(selIdx, 1)[0];
    items.push(p);
    selIdx = items.length - 1;
    menu.style.display = 'none';
    draw();
  }

  function toBack() {
    if (selIdx < 0 || selIdx >= items.length) return;
    const p = items.splice(selIdx, 1)[0];
    items.unshift(p);
    selIdx = 0;
    menu.style.display = 'none';
    draw();
  }

  function del() {
    if (selIdx < 0 || selIdx >= items.length) return;
    items.splice(selIdx, 1);
    selIdx = -1;
    menu.style.display = 'none';
    draw();
  }

  // Export: try download via toBlob, fallback to open data URL (iOS)
  function exportImg() {
    selIdx = -1; draw();
    // Attempt to use toBlob and download
    if (cvs.toBlob) {
      cvs.toBlob((blob) => {
        if (!blob) {
          fallbackOpen();
          return;
        }
        const a = document.createElement('a');
        const url = URL.createObjectURL(blob);
        a.href = url;
        a.download = 'collage.png';
        document.body.appendChild(a);
        a.style.display = 'none';
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 60000);
      }, 'image/png');
    } else {
      fallbackOpen();
    }

    function fallbackOpen() {
      const url = cvs.toDataURL('image/png');
      const w = window.open('', '_blank');
      if (!w) {
        // pop-up blocked fallback: show in current tab
        location.href = url;
        return;
      }
      w.document.write('<img src="' + url + '" style="width:100%;height:auto;"><p style="text-align:center;font-family:sans-serif;color:#222;">Long-press the image to save to Photos (mobile)</p>');
    }
  }

  // Initialize canvas initial size
  resizeCanvas();
  draw();

  // Accessibility: hide menu on outside tap
  document.addEventListener('pointerdown', (e) => {
    if (!menu.contains(e.target)) {
      menu.style.display = 'none';
      menu.setAttribute('aria-hidden', 'true');
    }
  });
</script>
</body>
</html>
