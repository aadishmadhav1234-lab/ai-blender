<!DOCTYPE html>
<html>
<head>
    <title>AI Pro Collage</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; overflow: hidden; }
        .menu { display: flex; gap: 8px; padding: 10px; background: #1c1c1e; overflow-x: auto; white-space: nowrap; }
        .btn { background: #007AFF; color: #fff; padding: 8px 15px; border-radius: 8px; border: none; font-size: 12px; font-weight: bold; }
        .btn-opt { background: #333; border: 1px solid #555; }
        canvas { display: block; margin: auto; background: #111; touch-action: none; }
    </style>
</head>
<body>

<div class="menu">
    <label class="btn">Add Photos <input type="file" id="fileIn" accept="image/*" multiple style="display:none"></label>
    <button class="btn btn-opt" onclick="setOrient('P')">Portrait Mode</button>
    <button class="btn btn-opt" onclick="setOrient('L')">Landscape Mode</button>
    <button class="btn" style="background:#34C759" onclick="download()">Save</button>
</div>

<canvas id="cvs"></canvas>

<script>
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    let items = [], selectedIdx = -1, isResizing = false;
    const handleSize = 20; // Size of the resize circle for touch

    function initCanvas() {
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight - 60;
    }
    window.onresize = initCanvas;
    initCanvas();

    document.getElementById('fileIn').onchange = (e) => {
        for (let file of e.target.files) {
            let reader = new FileReader();
            reader.onload = (ev) => {
                let img = new Image();
                img.src = ev.target.result;
                img.onload = () => {
                    const w = 150, h = 150 * (img.height / img.width);
                    items.push({ img, x: 50, y: 50, w, h });
                    draw();
                };
            };
            reader.readAsDataURL(file);
        }
    };

    function setOrient(type) {
        if (selectedIdx === -1) return;
        let itm = items[selectedIdx];
        if (type === 'P') { itm.h = itm.w * 1.5; } 
        else { itm.w = itm.h * 1.5; }
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, cvs.width, cvs.height);
        items.forEach((itm, i) => {
            ctx.drawImage(itm.img, itm.x, itm.y, itm.w, itm.h);
            if (i === selectedIdx) {
                ctx.strokeStyle = '#007AFF'; ctx.lineWidth = 2;
                ctx.strokeRect(itm.x, itm.y, itm.w, itm.h);
                // Draw Resize Handle (Bottom Right Circle)
                ctx.fillStyle = '#007AFF';
                ctx.beginPath();
                ctx.arc(itm.x + itm.w, itm.y + itm.h, handleSize/2, 0, Math.PI*2);
                ctx.fill();
            }
        });
    }

    cvs.onpointerdown = (e) => {
        const rect = cvs.getBoundingClientRect();
        const x = e.clientX - rect.left, y = e.clientY - rect.top;
        
        if (selectedIdx !== -1) {
            const itm = items[selectedIdx];
            const dist = Math.sqrt((x - (itm.x + itm.w))**2 + (y - (itm.y + itm.h))**2);
            if (dist < handleSize) { isResizing = true; return; }
        }

        selectedIdx = items.findLastIndex(itm => x > itm.x && x < itm.x + itm.w && y > itm.y && y < itm.y + itm.h);
        draw();
    };

    cvs.onpointermove = (e) => {
        if (selectedIdx === -1) return;
        const rect = cvs.getBoundingClientRect();
        const x = e.clientX - rect.left, y = e.clientY - rect.top;
        const itm = items[selectedIdx];

        if (isResizing) {
            itm.w = Math.max(30, x - itm.x);
            itm.h = Math.max(30, y - itm.y);
        } else if (e.buttons === 1) {
            itm.x = x - itm.w/2; itm.y = y - itm.h/2;
        }
        draw();
    };

    cvs.onpointerup = () => { isResizing = false; };

    function download() {
        const link = document.createElement('a');
        link.download = 'collage.png';
        link.href = cvs.toDataURL();
        link.click();
    }
</script>
</body>
</html>
