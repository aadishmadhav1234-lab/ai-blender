<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Collage Studio Pro — iOS</title>
    <style>
        :root { --accent: #007AFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: #000; color: #fff; font-family: -apple-system, system-ui; overflow: hidden; }

        /* FIXED SCREEN WRAPPERS */
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; z-index: 10; }
        #screen-welcome { display: flex; background: linear-gradient(135deg,#1e3c72,#2a5298); z-index: 20; }
        
        .btn { padding: 12px 24px; border-radius: 12px; border: none; font-weight: 600; font-size: 16px; cursor: pointer; }
        .btn-white { background: #fff; color: #000; }
        .btn-next { background: var(--accent); color: #fff; margin-top: 20px; display: none; animation: fadeIn 0.3s; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* EDITOR UI */
        #editor { background: #000; display: none; }
        .toolbar { 
            width: 100%; background: #1c1c1e; display: flex; gap: 8px; padding: 12px; 
            overflow-x: auto; border-bottom: 0.5px solid #333; flex-shrink: 0;
        }
        .tool-btn { padding: 8px 12px; border-radius: 8px; border: none; background: #2c2c2e; color: #fff; font-size: 13px; white-space: nowrap; }
