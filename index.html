<!DOCTYPE html>
<html>
<head>
    <title>Collage Studio Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --accent: #007AFF; --bg: #000; --card: rgba(28, 28, 30, 0.95); }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .tab { display: none; height: 100%; width: 100%; flex-direction: column; position: relative; }
        .tab.active { display: flex; }

        /* Screen 1: Centered Welcome */
        #screen-welcome { 
            background: #000 url('image_8c0a32.jpg') no-repeat center center; 
            background-size: cover; justify-content: center; align-items: center; 
        }
        .large-add-btn {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 2px solid var(--accent); width: 220px; height: 220px; border-radius: 50%;
            color: white; font-size: 20px; font-weight: 800; display: flex; align-items: center; 
            justify-content: center; text-align: center; cursor: pointer; box-shadow: 0 0 30px rgba(0, 122, 255, 0.4);
        }
        #nextBtn {
            background: linear-gradient(135deg, #BD00FF, #007AFF); border: none;
            width: 160px; padding: 15px; border-radius: 30px; color: white; margin-top: 30px;
            font-weight: bold; display: none; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* Screen 3: Editor */
        .editor-top { height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: #1c1c1e; border-bottom: 1px solid #333; }
        canvas { background: #111; touch-action: none; display: block; margin: auto; flex-grow: 1; }
        .dock { background: #1c1c1e; border-top: 1px solid #333; padding: 15px 10px 30px; }
        .tool-row { display: flex; justify-content: space-around; gap: 10px; }
        .tool { background: #333; border: none; color: #fff; padding: 12px; border-radius: 12px; font-size: 13px; font-weight: bold; flex: 1; }
        
        /* Export Overlay */
        #export-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column; align-items: center; padding-top: 40px;
        }
        .action-box { width: 95%; display: flex; gap: 8px; margin: 20px 0; }
        .act-btn { flex: 1; background: #2C2C2E; border-radius: 15px; padding: 15px 5px; color: #007AFF; font-weight: bold; text-align: center; font-size: 12px; }
        #preview-img { width: 85%; border-radius: 10px; border: 1px solid #444; max-height: 60%; object-fit: contain; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="screen-welcome" class="tab active">
        <label class="large-add-btn">ADD PHOTOS<input type="file" id="fileIn" accept="image/*" multiple></label>
        <button id="nextBtn">NEXT ➔</button>
    </div>

    <div id="screen-layout" class="tab" style="justify-content:center; align-items:center;">
        <div style="background:var(--card); padding:30px; border-radius:30px; text-align:center; width:80%;">
            <h2>Grid Style</h2>
            <button class="tool" style="width:100%; margin:10px 0; padding:20px;" onclick="initEditor('P')">Portrait Stack</button>
            <button class="tool" style="width:100%; margin:10px 0; padding:20px;" onclick="initEditor('L')">Landscape Grid</button>
        </div>
    </div>

    <div id="screen-editor" class="tab">
        <div class="editor-top">
            <button style="background:none; border:none; color:#8e8e93;" onclick="location.reload()">Exit</button>
            <div style="display:flex; gap:10px;">
                <button class="tool" style="padding:5px 12px;" onclick="undo()">↩</button>
                <button class="tool" style="padding:5px 12px;" onclick="redo()">↪</button>
            </div>
            <button style="background:none; border:none; color:#34C759; font-weight:bold;" onclick="showExport()">EXPORT</button>
        </div>
        <canvas id="cvs"></canvas>
        <div class="dock">
            <div class="tool-row">
                <button class="tool" onclick="reformat('P')">Portrait</button>
                <button class="tool" onclick="reformat('L')">Landscape</button>
                <button class="tool" style="background:#FF3B30;" onclick="deleteItem()">Delete</button>
            </div>
        </div>
    </div>

    <div id="export-overlay">
        <div style="position:absolute; top:20px; right:20px; font-size:28px;" onclick="document.getElementById('export-overlay').style.display='none'">✕</div>
        <div class="action-box">
            <div class="act-btn" onclick="downloadImg()">Download</div>
            <div class="act-btn" onclick="alert('Long-press the image below to Save to Photos')">Save Photo</div>
            <div class="act-btn" id="shareBtn" onclick="shareImg()">Share 📤</div>
        </div>
        <img id="preview-img" src="">
        <p style="color:#555; margin-top:10px; font-size:12px;">Final Preview</p>
    </div>

<script>
    let rawFiles = [], items = [], history = [], redoStack = [], selectedIdx = -1, handleIdx = -1;
    const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');

    document.getElementById('fileIn').onchange = (e) => {
        rawFiles = Array.from(e.target.files);
        if(rawFiles.length > 0) document.getElementById('nextBtn').style.display = 'block';
    };
    document.getElementById('nextBtn').onclick = () => {
        document.getElementById('screen-welcome').classList.remove('active');
        document.getElementById('screen-layout').classList.add('active');
    };

    function saveState() { history.push(JSON.stringify(items)); if(history.length > 20) history.shift(); redoStack = []; }
    function undo() { if(history.length > 1) { redoStack.push(history.pop()); items = JSON.parse(history[history.length-1]); draw(); } }
    function redo() { if(redoStack.length > 0) { const s = redoStack.pop(); history.push(s); items = JSON.parse(s); draw(); } }

    function initEditor(mode) {
        document.getElementById('screen-layout').classList.remove('active');
        document.getElementById('screen-editor').classList.add('active');
        cvs.width = window.innerWidth; cvs.height = window.innerHeight - 170;
        let loaded = 0;
        rawFiles.forEach((file, i) => {
            let reader = new FileReader();
            reader.onload = (ev) => {
                let img = new Image(); img.src = ev.target.result;
                img.onload = () => {
                    items.push({ src:img.src, x:0, y:0, w:100, h:100 });
                    if(++loaded === rawFiles.length) { reformat(mode); }
                }
            };
            reader.readAsDataURL(file);
        });
    }

    function reformat(mode) {
        let cols = (mode === 'P') ? 1 : 2;
        let cellW = cvs.width/cols, cellH = cvs.height/Math.ceil(items.length/cols);
        items.forEach((itm, i) => {
            itm.w = cellW - 20; itm.h = cellH - 20;
            itm.x = (i % cols) * cellW + 10;
            itm.y = Math.floor(i / cols) * cellH + 10;
            if(mode === 'L' && i === items.length-1 && items.length % 2 !== 0) itm.x = (cvs.width - itm.w) / 2;
        });
        saveState(); draw();
    }

    function draw() {
        ctx.clearRect(0,0,cvs.width,cvs.height);
        items.forEach((itm, i) => {
            let tempImg = new Image(); tempImg.src = itm.src;
            ctx.drawImage(tempImg, itm.x, itm.y, itm.w, itm.h);
            if(i === selectedIdx) {
                ctx.strokeStyle = '#007AFF'; ctx.lineWidth = 3; ctx.strokeRect(itm.x, itm.y, itm.w, itm.h);
            }
        });
    }

    cvs.onpointerdown = (e) => {
        const r = cvs.getBoundingClientRect(); const x = e.clientX-r.left, y = e.clientY-r.top;
        selectedIdx = items.findLastIndex(itm => x > itm.x && x < itm.x+itm.w && y > itm.y && y < itm.y+itm.h);
        draw();
    };

    cvs.onpointermove = (e) => {
        if(selectedIdx === -1 || e.buttons !== 1) return;
        const r = cvs.getBoundingClientRect(); const x = e.clientX-r.left, y = e.clientY-r.top;
        let itm = items[selectedIdx]; itm.x = x-itm.w/2; itm.y = y-itm.h/2; draw();
    };

    cvs.onpointerup = () => { if(selectedIdx > -1) saveState(); };
    function deleteItem() { if(selectedIdx > -1) { items.splice(selectedIdx,1); selectedIdx=-1; saveState(); draw(); } }
    
    function showExport() { document.getElementById('preview-img').src = cvs.toDataURL(); document.getElementById('export-overlay').style.display='flex'; }
    function downloadImg() { const a = document.createElement('a'); a.download='collage.png'; a.href=cvs.toDataURL(); a.click(); }

    // REPAIRED SHARE LOGIC
    async function shareImg() {
        try {
            const dataUrl = cvs.toDataURL("image/png");
            const blob = await (await fetch(dataUrl)).blob();
            const file = new File([blob], 'my-collage.png', { type: 'image/png' });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({
                    files: [file],
                    title: 'Collage Studio',
                    text: 'Made with Collage Studio Pro'
                });
            } else {
                alert("Your browser doesn't support file sharing. Use Download instead.");
            }
        } catch (err) {
            console.error("Share failed:", err);
        }
    }
</script>
</body>
</html>
