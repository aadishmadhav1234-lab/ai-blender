<!DOCTYPE html>
<html>
<head>
    <title>AI Blender</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .btn { background: #007AFF; color: #fff; padding: 15px; border-radius: 10px; display: block; margin: 10px auto; width: 80%; border: none; font-weight: bold; }
        canvas { max-width: 100%; border-radius: 10px; margin-top: 20px; background: #222; }
        input { display: none; }
    </style>
</head>
<body>
    <h1>AI Image Blender</h1>
    <label class="btn">?? Select Base Image <input type="file" id="baseIn" accept="image/*"></label>
    <label class="btn">? Select Overlay <input type="file" id="overIn" accept="image/*"></label>
    <button class="btn" onclick="blend()">Combine Images</button>
    <canvas id="cvs"></canvas>

    <script>
        let bImg = new Image(), oImg = new Image();
        const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');

        document.getElementById('baseIn').onchange = (e) => load(e, bImg);
        document.getElementById('overIn').onchange = (e) => load(e, oImg);

        function load(e, img) {
            let reader = new FileReader();
            reader.onload = (ev) => { img.src = ev.target.result; img.onload = () => { cvs.width=img.width; cvs.height=img.height; draw(); } };
            reader.readAsDataURL(e.target.files[0]);
        }

        function draw() {
            if (!bImg.src) return;
            ctx.drawImage(bImg, 0, 0);
            if (oImg.src) {
                ctx.globalAlpha = 0.5; // Blending effect
                ctx.drawImage(oImg, 0, 0, bImg.width, bImg.height);
                ctx.globalAlpha = 1.0;
            }
        }

        function blend() { draw(); alert("Images Blended!"); }
    </script>
</body>
</html>
